name: Backport PR

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  prepare:
    name: Prepare Backport Targets
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read # Reads repository workflow script and remote branch refs.
      pull-requests: write # Adds comments/labels to the source pull request.
    outputs:
      dry_run: ${{ steps.plan.outputs.dry_run }}
      has_targets: ${{ steps.plan.outputs.has_targets }}
      targets: ${{ steps.plan.outputs.targets }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Plan backports
        id: plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
          BACKPORT_DRY_RUN: ${{ vars.BACKPORT_DRY_RUN || 'true' }}
        run: ./.github/workflows/backport.sh

  backport:
    name: Create Backport Pull Requests
    needs: prepare
    if: needs.prepare.outputs.has_targets == 'true' && needs.prepare.outputs.dry_run != 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write # Pushes generated backport branches.
      pull-requests: write # Creates backport pull requests and comments on failures.
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.targets) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Create backport pull request
        id: cherry_pick
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ matrix.pr_number }}
          PR_TITLE: ${{ matrix.pr_title }}
          MERGE_COMMIT_SHA: ${{ matrix.merge_commit_sha }}
          TARGET_BRANCH: ${{ matrix.target }}
          TARGET_VERSION: ${{ matrix.version }}
        run: |
          backport_branch="backport-${PR_NUMBER}-to-${TARGET_BRANCH}"
          body=$(cat <<EOF
          ## Automatic Backport

          Backport of #${PR_NUMBER} to \`${TARGET_BRANCH}\`.

          **Target:** \`${TARGET_BRANCH}\`
          **Version:** \`${TARGET_VERSION}\`
          EOF
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git checkout -b "$backport_branch" "origin/${TARGET_BRANCH}"
          git cherry-pick -x "$MERGE_COMMIT_SHA"
          git push origin "$backport_branch"
          gh pr create \
            --repo "$REPOSITORY" \
            --base "$TARGET_BRANCH" \
            --head "$backport_branch" \
            --title "[Backport ${TARGET_BRANCH}] ${PR_TITLE}" \
            --body "$body" \
            --label backport

      - name: Handle failed action backport
        if: steps.cherry_pick.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ matrix.pr_number }}
          TARGET_BRANCH: ${{ matrix.target }}
        run: |
          body="❌ **Backport to \`${TARGET_BRANCH}\` failed**"$'\n\n'"Automatic backport failed for this target. Please inspect workflow logs and backport manually if needed."
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body "$body"
          gh pr edit "$PR_NUMBER" --repo "$REPOSITORY" --add-label "backport-failed" 2>/dev/null || true
